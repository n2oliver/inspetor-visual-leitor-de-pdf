<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspetor Visual</title>
    <script src="insp.js"></script>
    <style>
        .d-flex {
            display: flex;
        }
        .justify-content-between {
            justify-content: space-between;
        }
        .m-1 {
            margin: 4px;
        }
        .mb-1 {
            margin-bottom: 4px;
        }
        .mt-0 {
            margin-top: 0 !important;
        }
        .m-0 {
            margin: 0 !important;
        }
        .alert {
            margin: 14px;
            border: solid 1px white;
            border-radius: 10px;
        }
        .alert-info {
            background-color:darkcyan;
            color: aliceblue;
        }
        .w-100 {
            width: 100% !important;
        }
        .justify-content-end {
            justify-content: end;
        }
        .align-items-center {
            align-items: center;
        }
        .form-control {
            padding: 4px;
            border-radius: 5px;
            border: solid 1px lightcyan;
        }
    </style>
</head>
<body style="margin: 0">
    <div style="background-color: #234353; color: white; padding: 14px; width: 300px">
        <div class="d-flex align-items-center">
            <img class="m-1 mt-0" src="insp-pdf.png" style="float: left; height: 32px; width: 32px" />
            <span class="m-1 mt-0" id="tooltip">Abra e ouça PDFs usando o leitor integrado.</span>
        </div>
        <div class="d-flex">
            <div class="m-1 mt-0">
                <input class="form-check-input" type="checkbox" checked="true" role="switch" id="insp_visual_ligado" />
            </div>
            <div class="m-1 mt-0">
                <label id="label_for_insp_visual_ligado" class="form-check-label" for="insp_visual_ligado">Ativado</label>
            </div>
        </div>
        <div class="d-flex justify-content-between mb-1">
            <select id="vozes" class="form-control">
            </select>
            <button id="btn-info" class="btn-info rounded-circle" style="width: 24px; height: 24px; line-height: 0px;" title="1. Abra um PDF e ouça-o em voz alta (como um audiobook)."><strong class="text-primary">?</strong></button>
            
        </div>
        <div id="info" class="alert m-0 alert-info" style="display: none; padding-right: 24px;">
            <ol>
                <li>Abra um PDF e ouça-o em voz alta (como um audiobook)</li>
            </ol>
        </div>
        <div class="d-flex justify-content-end">
            <a href="https://n2oliver.com" id="n2oliver-link"><img src="images/n2oliver.png" class="w-100" /></a>
        </div>
        
    </div>
</body>
</html>
